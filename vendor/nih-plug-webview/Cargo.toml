[package]
name = "nih_plug_webview"
version = "0.2.0"
edition = "2021"
authors = ["Max Huttunen <max.huttunen@gmail.com>", "Juan Cruz Maisú (fork ÉTER)"]
license = "ISC"
description = "Webview editor para nih-plug — fork ÉTER portado a baseview/rwh actuales (Windows-first)"

[dependencies]
nih_plug = { git = "https://github.com/robbert-vdh/nih-plug.git" }
baseview = { git = "https://github.com/RustAudio/baseview" }
wry = "0.35"
serde_json = "1.0"
crossbeam = "0.8"
keyboard-types = "0.8.3"
rwh06 = { package = "raw-window-handle", version = "0.6" }
rwh05 = { package = "raw-window-handle", version = "0.5" }
